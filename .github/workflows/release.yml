name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Run Rust core tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and publish Tauri release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "saynow v__VERSION__"
          releaseBody: |
            Windows 安装包见本 Release 附件。

            ## Change Log

            - 修复按下快捷键后录音浮窗已显示、但麦克风尚未真正开始采集导致开头漏录的问题。
            - 录音启动现在会等待浏览器确认 MediaRecorder 已开始，再显示“正在录音”状态。
            - 将原生热键按住确认延迟从 200ms 降低到 60ms，减少用户开口前的固定等待。
            - 增加录音启动耗时日志，便于排查麦克风 ready 延迟。
            - 学习规则状态和风险等级改为中文展示，并增加问号说明提示。
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          args: --features desktop

      - name: Build Tauri bundle
        if: github.ref_type != 'tag'
        run: npm run tauri -- build --features desktop

      - name: Upload Windows bundle
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: saynow-windows-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
