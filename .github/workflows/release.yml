name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Run Rust core tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and publish Tauri release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "saynow v__VERSION__"
          releaseBody: |
            Windows 安装包见本 Release 附件。

            ## Change Log

            - 自学习引擎现在会同时整理明确纠错记录和成功识别历史：纠错作为强信号，历史作为弱信号。
            - 新增识别历史学习队列，已参与整理的历史会标记为已处理，避免重复请求学习模型。
            - 学习模型输入新增 recognitionHistory，并要求历史类规则必须有重复证据，降低把一次性内容学成规则的风险。
            - 学习规则现在记录并展示“纠错 / 历史”两类证据数量，便于判断规则来源。
            - 个性化页学习引擎文案更新为“触发样本”和“LLM 整理纠错与历史”，规则列表增加历史证据展示。
            - 更新自学习引擎文档，说明双输入学习、触发策略、隐私边界和提示词拼接行为。
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          args: --features desktop

      - name: Build Tauri bundle
        if: github.ref_type != 'tag'
        run: npm run tauri -- build --features desktop

      - name: Upload Windows bundle
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: saynow-windows-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
