name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Run Rust core tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and publish Tauri release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "saynow v__VERSION__"
          releaseBody: "Windows 安装包见本 Release 附件。"
          releaseDraft: false
          prerelease: false
          args: --features desktop

      - name: Build Tauri bundle
        if: github.ref_type != 'tag'
        run: npm run tauri -- build --features desktop

      - name: Upload Windows bundle
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: saynow-windows-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
