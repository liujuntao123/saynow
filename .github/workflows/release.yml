name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Run Rust core tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and publish Tauri release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "saynow v0.1.33"
          releaseBody: |
            Windows 安装包见本 Release 附件。

            ## Change Log

            - 将录音链路切换为 Tauri 原生命令和 cpal 输入流，输出 WAV 音频，减少对 WebView 麦克风权限的依赖。
            - 新增原生录音开始、停止和取消命令，并在录音启动失败时清理会话状态和浮层。
            - 移除浏览器预览 mock API，桌面端统一通过 Tauri invoke 调用后端能力。
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          args: --features desktop

      - name: Build Tauri bundle
        if: github.ref_type != 'tag'
        run: npm run tauri -- build --features desktop

      - name: Upload Windows bundle
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: saynow-windows-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
