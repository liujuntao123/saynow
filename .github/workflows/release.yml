name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Run Rust core tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and publish Tauri release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "saynow v__VERSION__"
          releaseBody: |
            Windows 安装包见本 Release 附件。

            ## Change Log

            - 梳理热键录音状态流，区分 starting / recording / stopping，避免异步启动和松开事件互相覆盖。
            - 录音浮层只在 MediaRecorder 真正启动后显示，避免 UI 展示与真实录音状态不一致。
            - 从低级键盘 hook 的关键路径移除输入目标采集，降低快捷键偶发迟滞或不生效风险。
            - 松开快捷键时优先停止录音，文本注入时再恢复目标窗口，减少焦点恢复阻塞录音流程。
            - 增加录音启动取消清理，处理启动过程中已经松开快捷键或窗口卸载的边界情况。
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          args: --features desktop

      - name: Build Tauri bundle
        if: github.ref_type != 'tag'
        run: npm run tauri -- build --features desktop

      - name: Upload Windows bundle
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: saynow-windows-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
